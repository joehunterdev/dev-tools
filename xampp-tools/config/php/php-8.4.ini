; ============================================================
; PHP 8.4 â€” XAMPP Dev Configuration
; Maintained manually. Used by install-php as clean install source.
; ============================================================
; Quirks: opcache is statically compiled â€” no zend_extension line needed.
;         Repair-PhpIni will comment it out if it appears elsewhere.

[PHP]

; â”€â”€ Core â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
engine                     = On
short_open_tag             = Off
precision                  = 14
output_buffering           = 4096
zlib.output_compression    = Off
implicit_flush             = Off
serialize_precision        = -1
disable_functions          =
disable_classes            =
realpath_cache_size        = 8192k
realpath_cache_ttl         = 300
zend.enable_gc             = On
zend.exception_ignore_args = Off
expose_php                 = Off

; â”€â”€ Resource Limits â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
max_execution_time  = 300
max_input_time      = 120
max_input_vars      = 3000
memory_limit        = 512M

; â”€â”€ Error Handling â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors         = On
display_startup_errors = On
log_errors             = On
error_log              = "C:\xampp\php\logs\php_error_log"
ignore_repeated_errors = Off
report_memleaks        = On

; â”€â”€ Request / Data â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
variables_order   = "GPCS"
request_order     = "GP"
post_max_size     = 600M
default_charset   = "UTF-8"
default_mimetype  = "text/html"
include_path      = "C:\xampp\php\PEAR"
extension_dir     = "C:\xampp\php\ext"

; â”€â”€ File Uploads â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
file_uploads       = On
upload_tmp_dir     = "C:\xampp\tmp"
upload_max_filesize = 600M
max_file_uploads   = 20

; â”€â”€ URLs â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
allow_url_fopen    = On
allow_url_include  = Off
default_socket_timeout = 60

; â”€â”€ Extensions â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
extension = bz2
extension = curl
extension = fileinfo
extension = gd
extension = gettext
extension = mbstring
extension = exif        ; must be after mbstring
extension = mysqli
extension = openssl
extension = pdo_mysql
extension = pdo_sqlite
extension = soap
extension = sockets
extension = zip

; â”€â”€ OPcache (built-in on PHP 8.4+, no zend_extension needed) â”€
[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
opcache.revalidate_freq        = 0
opcache.validate_timestamps    = 1
opcache.save_comments          = 1
opcache.optimization_level     = 0x7FFEBFFF

; â”€â”€ SSL / cURL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
curl.cainfo    = "C:\xampp\php\extras\ssl\cacert.pem"
openssl.cafile = "C:\xampp\php\extras\ssl\cacert.pem"

; â”€â”€ Date â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[Date]
date.timezone = Europe/London

; â”€â”€ Session â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[Session]
session.save_handler     = files
session.save_path        = "C:\xampp\tmp"
session.use_strict_mode  = 0
session.use_cookies      = 1
session.use_only_cookies = 1
session.name             = PHPSESSID
session.gc_maxlifetime   = 3600
session.cookie_httponly  =
session.cookie_samesite  =
session.sid_length       = 26

; â”€â”€ MySQL / PDO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[MySQLi]
mysqli.max_persistent    = -1
mysqli.allow_persistent  = On
mysqli.max_links         = -1
mysqli.default_port      = 3306
mysqli.default_socket    =

pdo_mysql.default_socket =

; â”€â”€ Mail â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[mail function]
SMTP      = localhost
smtp_port = 25

; â”€â”€ Misc â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
[CLI Server]
cli_server.color = On

[bcmath]
bcmath.scale = 0

[Tidy]
tidy.clean_output = Off

[soap]
soap.wsdl_cache_enabled = 1
soap.wsdl_cache_dir     = "/tmp"
soap.wsdl_cache_ttl     = 86400
soap.wsdl_cache_limit   = 5

[ldap]
ldap.max_links = -1

zend.assertions = 1

